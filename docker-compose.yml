services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-management-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=EmployeeManagementDb;User Id=sa;Password=password123;TrustServerCertificate=True;
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employee-management-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "password123"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: